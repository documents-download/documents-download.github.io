<!DOCTYPE html>
<html>
<head>
    <title>Download Center</title>
    <meta charset="utf-8">
    <style>
        body { background: #f4f7f9; color: #1a1a1b; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e1e8ed; max-width: 350px; }
        .btn { display: inline-block; margin-top: 25px; padding: 12px 24px; background: #007bff; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader" id="loader"></div>
        <h2 id="status">Подготовка файла...</h2>
        <p id="subtext">Ваш документ будет загружен автоматически.</p>
        <a href="#" class="btn" id="manualBtn" style="display:none;">Скачать вручную</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('file_url');
        const fileName = urlParams.get('name') || 'document';

        if (fileUrl) {
            const decodedUrl = decodeURIComponent(fileUrl);
            
            // Функция для скачивания
            const download = () => {
                const link = document.createElement('a');
                link.href = decodedUrl;
                link.download = decodeURIComponent(fileName);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Запускаем скачивание
            download();

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status').innerText = 'Файл готов';
                document.getElementById('subtext').innerText = 'Если скачивание не началось, нажмите кнопку:';
                const btn = document.getElementById('manualBtn');
                btn.href = decodedUrl;
                btn.style.display = 'inline-block';
            }, 3000);
        } else {
            window.location.href = "https://google.com";
        }
    </script>
</body>
</html>
